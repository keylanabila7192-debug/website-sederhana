<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kalkulator</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Verdana, sans-serif;
    }

    body{
      height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      background:#0d1117;
    }

    .calculator{
      width:340px;
      padding:20px;
      border-radius:20px;
      background:#161b22;
      border:2px solid #00ff99;
      box-shadow:0 0 20px #00ff99;
    }

    .display{
      width:100%;
      height:75px;
      border:none;
      outline:none;
      border-radius:15px;
      margin-bottom:15px;
      padding:15px;
      text-align:right;
      font-size:32px;
      background:#0d1117;
      color:#00ff99;
      box-shadow:inset 0 0 10px #00ff99;
    }

    .buttons{
      display:grid;
      grid-template-columns:repeat(4,1fr);
      gap:12px;
    }

    button{
      height:65px;
      border:none;
      border-radius:15px;
      font-size:22px;
      cursor:pointer;
      transition:0.2s;
      font-weight:bold;
    }

    button:hover{
      transform:scale(1.05);
    }

    .number{
      background:#21262d;
      color:white;
    }

    .operator{
      background:#624867;
      color:black;
    }

    .clear{
      background:#9e3d6a;
      color:rgb(255, 255, 255);
    }

    .equal{
      background:#8f246f;
      color:rgb(255, 255, 255);
      grid-column:span 2;
    }
  </style>
</head>
<body>

  <div class="calculator">

    <input type="text" id="display" class="display" value="0" readonly>

    <div class="buttons">
      <button class="clear" onclick="clearDisplay()">C</button>
      <button class="operator" onclick="percent()">%</button>
      <button class="operator" onclick="plusMinus()">±</button>
      <button class="operator" onclick="appendValue('/')">÷</button>

      <button class="number" onclick="appendValue('7')">7</button>
      <button class="number" onclick="appendValue('8')">8</button>
      <button class="number" onclick="appendValue('9')">9</button>
      <button class="operator" onclick="appendValue('*')">×</button>

      <button class="number" onclick="appendValue('4')">4</button>
      <button class="number" onclick="appendValue('5')">5</button>
      <button class="number" onclick="appendValue('6')">6</button>
      <button class="operator" onclick="appendValue('-')">−</button>

      <button class="number" onclick="appendValue('1')">1</button>
      <button class="number" onclick="appendValue('2')">2</button>
      <button class="number" onclick="appendValue('3')">3</button>
      <button class="operator" onclick="appendValue('+')">+</button>

      <button class="number" onclick="appendValue('0')">0</button>
      <button class="number" onclick="appendValue('.')">.</button>

      <button class="equal" onclick="calculate()">=</button>
    </div>

  </div>

  <script>
    const display = document.getElementById("display");

    function appendValue(value){
      if(display.value === "0" || display.value === "Error"){
        display.value = value;
      } else {
        display.value += value;
      }
    }

    function clearDisplay(){
      display.value = "0";
    }

    function calculate(){
      try{
        let result = eval(display.value);
        display.value = parseFloat(result.toFixed(10));
      }
      catch{
        display.value = "Error";
      }
    }

    function plusMinus(){
      try{
        let result = eval(display.value) * -1;
        display.value = parseFloat(result.toFixed(10));
      }
      catch{
        display.value = "Error";
      }
    }

    function percent(){
      try{
        let result = eval(display.value) / 100;
        display.value = parseFloat(result.toFixed(10));
      }
      catch{
        display.value = "Error";
      }
    }
  </script>

</body>
</html>
